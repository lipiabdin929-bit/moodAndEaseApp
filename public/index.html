<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood And Ease | Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🎭 Mood And Ease</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Track your mood, notes, and music.</p>
            <form id="login-form">
                <input type="text" id="login-user" placeholder="Username" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
            <hr>
            <p style="font-size: 0.9rem; margin-bottom: 10px; color: var(--text-muted);">New here? Create an account</p>
            <form id="register-form">
                <input type="text" id="reg-user" placeholder="Choose Username" required>
                <input type="password" id="reg-pass" placeholder="Choose Password" required>
                <button type="submit" style="background-color: var(--text-main);">Register</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
